name: Test

on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: '24'
        cache: 'npm'

    - run: npm ci

    - name: Run tests
      run: |
        shopt -s nullglob
        files=(tests/*.test.ts)
        if [ ${#files[@]} -eq 0 ]; then
          echo "No test files found under tests/"
          exit 1
        fi
        for f in "${files[@]}"; do
          echo "::group::$f"
          npx --yes tsx "$f"
          echo "::endgroup::"
        done
